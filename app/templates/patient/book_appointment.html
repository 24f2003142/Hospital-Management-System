<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Appointment - {{ doctor_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>
<body style="background-color:#dae9ea;">
  <nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#1a7679;">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo" width="120" height="50">
      </a>
      <div class="collapse navbar-collapse">
        <h5 class="text-white ms-3">Book Appointment for Dr. {{ doctor_name }}</h5>
      </div>
      <div class="d-inline-block">
        <a class="btn btn-outline-light" href="{{ url_for('patient', user_name=user_name) }}">Back</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="card p-3">
      <h4>Doctor</h4>
      <p><strong>{{ doctor_name }}</strong></p>

      <h5>Patient</h5>
      <p>{{ patient_name }}</p>

      <hr/>

      <h5>Select a slot</h5>
      {% if slots %}
        <form action="{{ url_for('confirm_booking', user_name=user_name) }}" method="POST">
          <input type="hidden" name="doctor_id" value="{{ doctor_id }}">
          <input type="hidden" name="patient_id" value="{{ patient_id }}">

          <div class="list-group">
            {% for s in slots %}
              <label class="list-group-item d-flex justify-content-between align-items-center {% if not s.available %}list-group-item-secondary{% endif %}">
                <div>
                  <input type="radio" name="slot_id" value="{{ s.id }}" {% if not s.available %}disabled{% endif %} required>
                  <strong>{{ s.date }}</strong> — {{ "%02d:00" | format(s.start) }} to {{ "%02d:00" | format(s.end) }}
                  <small class="text-muted"> ({{ s.bookings }} / 5 booked) </small>
                </div>
                <div>
                  {% if s.bookings >= 5 %}
                    <span class="badge bg-secondary">Full</span>
                  {% elif s.bookings >= 3 %}
                    <span class="badge bg-danger">{{ s.bookings }}</span>
                  {% elif s.status == 'open' %}
                    <span class="badge bg-primary">{{ s.bookings }}</span>
                  {% else %}
                    <span class="badge bg-success">{{ s.bookings }}</span>
                  {% endif %}
                </div>
              </label>
            {% endfor %}
          </div>

          <div class="mt-3">
            <button type="submit" class="btn btn-success">Confirm Booking</button>
            <a href="{{ url_for('patient', user_name=user_name) }}" class="btn btn-secondary">Cancel</a>
          </div>
        </form>
      {% else %}
        <p>No slots available for this doctor currently. Please try later.</p>
      {% endif %}
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
