<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Patient History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>
  <body style="background-color: #dae9ea;">
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #1a7679;">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
              <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo" width="120" height="50" class="d-inline-block align-text-top">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <h3 style="color: white;">Department of {{name}}</h3>
                    </li>
                </ul>
            </div>
            <div class="d-inline-block align-text-top-left">
                <div class="collapse navbar-collapse" id="navbarProfile">
                    <ul class="navbar-nav">
                      <a class="btn btn-outline-light" class="d-inline-block align-text-top-left" href="{{ url_for('patient', user_name=user_name) }}" > Back </a>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
      <h1 style="color:#1a7679">Department Overview </h1>
      <p>{{overview}}</p>
      <h1 style="color:#1a7679">Doctors List </h1>
      <p>This Table Shows the list of all the doctors employes in the current department</p>
      <div class="table-responsive">
        <table class="table table-striped table-hover">
          <thead>
            <tr>
              <th scope="col">S No.</th>
              <th scope="col">Doctor Name</th>
              <th scope="col">action</th>
            </tr>
          </thead>
          <tbody>
            {% for doctor in alldoctors %}
              <tr>
                <th scope="row">{{loop.index}}</th>
                <td>{{doctor[1]}} {{doctor[2]}} {{doctor[3]}}</td>
                <td>
                  <form action="{{ url_for('booking_details', user_name=user_name) }}" method="POST" style="display:inline;">
                    <input type="hidden" name="doctor_id" value="{{ doctor[0] }}">
                    <button type="submit" class="btn btn-outline-success">Book Appointment</button>
                  </form>
                  <form action="{{ url_for('doctor_details', user_name=user_name) }}" method="POST" style="display:inline;">
                    <input type="hidden" name="doctor_id" value="{{ doctor[0] }}">
                    <input type="hidden" name="department_name" value="{{ name }}">
                    <button type="submit" class="btn btn-outline-primary">View Details</button>
                  </form>
                </td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

  </body>
</html>
