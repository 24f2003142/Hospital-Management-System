<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Patient History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>
  <body style="background-color: #dae9ea;">
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #1a7679;">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
              <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo" width="120" height="50" class="d-inline-block align-text-top">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <h3 style="color: white;">Doctor Details</h3>
                    </li>
                </ul>
            </div>
            <div class="d-inline-block align-text-top-left">
                <div class="collapse navbar-collapse" id="navbarProfile">
                    <ul class="navbar-nav">
                      <a class="btn btn-outline-light" class="d-inline-block align-text-top-left" href="{{ url_for('patient', user_name=user_name) }}" > Back </a>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-4">
    <div class="row align-items-center bg-white p-4 rounded shadow-sm">
        <!-- text column -->
        <div class="col-12 col-md-8">
        <h1 class="h3 text-primary mb-3">Doctor info</h1>

        <p class="mb-1"><strong>Doctor Name:</strong> {{ doctorinfo[1] }} {{ doctorinfo[2] }} {{ doctorinfo[3] }}</p>
        <p class="mb-1"><strong>Department Name:</strong> {{ dname }}</p>
        <p class="mb-1"><strong>Specialisation:</strong> {{ doctorinfo[6] }}</p>
        <p class="mb-1"><strong>Experience (Date of Specialisation completion):</strong> {{ doctorinfo[7] }}</p>
        <p class="mb-0"><strong>Bio:</strong> {{ doctorinfo[8] }}</p>
        </div>

        <!-- avatar column -->
        <div class="col-12 col-md-4 text-md-end mt-3 mt-md-0">
        <img src="{{ url_for('static', filename='user.png') }}"
            alt="Doctor avatar"
            width="200" height="200"
            class="rounded-circle img-fluid border">
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

  </body>
</html>
